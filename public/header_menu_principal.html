<!-- ============================================================
   header_menu_principal.html — JCT POS v2
   Header global para todas las páginas INTERNAS (excepto menu)
   Incluir con: fetch('header_menu_principal.html')
   ============================================================ -->
<link rel="stylesheet" href="theme.css">

<header class="app-header">
  <!-- Brand + Back -->
  <div style="display:flex;align-items:center;gap:8px;">
    <button onclick="window.history.back()" class="h-btn" title="Volver">
      <i class="fas fa-arrow-left"></i>
    </button>
    <a href="menu_principal.html" class="brand">
      <div class="brand-icon"><i class="fas fa-cash-register"></i></div>
      <span class="brand-name">JCT POS</span>
    </a>
  </div>

  <!-- Actions -->
  <div class="header-actions">
    <!-- Toggle tema -->
    <button class="theme-toggle h-btn" title="Cambiar tema">
      <i class="fas fa-sun"></i>
    </button>

    <!-- Notificaciones -->
    <div style="position:relative;">
      <button class="h-btn" onclick="toggleNotiPanel()" title="Notificaciones" id="notiBell">
        <i class="fas fa-bell"></i>
        <span class="notif-dot" id="notiDot" style="display:none;"></span>
      </button>
    </div>

    <!-- Usuario -->
    <div class="dropdown">
      <button class="h-btn" onclick="toggleUserMenu()" title="Mi cuenta">
        <i class="fas fa-user"></i>
      </button>
      <div class="dropdown-panel" id="userDropdown" style="display:none;">
        <div class="dropdown-item" style="padding:14px 16px;border-bottom:1px solid var(--border);cursor:default;">
          <i class="fas fa-user-circle" style="color:var(--primary);font-size:1.2em;"></i>
          <span id="headerUserName" style="font-weight:600;"></span>
        </div>
        <div class="dropdown-item" onclick="location.href='config_general.html'">
          <i class="fas fa-cog"></i> Configuración
        </div>
        <div class="dropdown-item danger" onclick="cerrarSesion()">
          <i class="fas fa-sign-out-alt"></i> Cerrar sesión
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Panel de notificaciones lateral -->
<div id="notiPanelHeader" style="
  position:fixed;top:64px;right:0;bottom:0;width:340px;
  background:var(--sidebar-bg);border-left:1px solid var(--sidebar-border);
  display:flex;flex-direction:column;z-index:2000;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.23,1,.32,1);
  box-shadow:var(--shadow-lg);
">
  <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
    <span style="font-weight:700;color:var(--text);">Notificaciones</span>
    <button onclick="toggleNotiPanel()" class="btn-close">&times;</button>
  </div>
  <div id="notiPanelList" style="flex:1;overflow-y:auto;padding:8px 0;"></div>
  <div style="padding:12px 20px;border-top:1px solid var(--border);">
    <button onclick="limpiarNotificaciones()" class="btn btn-secondary btn-block" style="font-size:.82em;">
      <i class="fas fa-broom"></i> Limpiar notificaciones
    </button>
  </div>
</div>
<div id="notiOverlay" onclick="toggleNotiPanel()" style="
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1999;
  backdrop-filter:blur(2px);
"></div>

<script>
(function initHeader(){
  // Usuario
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  const name = user.nombre || user.username || '';
  const el   = document.getElementById('headerUserName');
  if (el) el.textContent = name;

  // Cerrar sesión
  window.cerrarSesion = function() {
    const TOKEN = localStorage.getItem('token');
    fetch('http://localhost:5000/api/auth/logout',{method:'POST',headers:{Authorization:`Bearer ${TOKEN}`}})
      .finally(()=>{ localStorage.clear(); sessionStorage.clear(); window.location.replace('login.html'); });
  };

  // User menu
  window.toggleUserMenu = function() {
    const m = document.getElementById('userDropdown');
    if (m) m.style.display = m.style.display==='block'?'none':'block';
  };

  // Noti panel
  let notiOpen = false;
  window.toggleNotiPanel = function() {
    notiOpen = !notiOpen;
    const panel   = document.getElementById('notiPanelHeader');
    const overlay = document.getElementById('notiOverlay');
    panel.style.transform   = notiOpen ? 'translateX(0)' : 'translateX(100%)';
    overlay.style.display   = notiOpen ? 'block' : 'none';
    document.body.style.overflow = notiOpen ? 'hidden' : '';
    if (notiOpen) cargarNotiPanel();
  };

  function cargarNotiPanel() {
    fetch('http://localhost:5000/api/notifications/acciones')
      .then(r=>r.json()).then(data=>{
        const el = document.getElementById('notiPanelList');
        const dot= document.getElementById('notiDot');
        if (dot) dot.style.display = data.length ? 'block' : 'none';
        if (!data.length) {
          el.innerHTML='<div class="noti-empty"><i class="fas fa-bell"></i><p>Sin notificaciones</p></div>';
          return;
        }
        const fmt=s=>{const d=new Date(s),p=n=>n<10?'0'+n:n;return`${p(d.getDate())}/${p(d.getMonth()+1)} ${p(d.getHours())}:${p(d.getMinutes())}`;};
        el.innerHTML=data.map(n=>`<div class="noti-item"><div class="noti-msg">${n.mensaje}</div><div class="noti-date">${fmt(n.fecha)}</div></div>`).join('');
      }).catch(()=>{});
  }

  window.limpiarNotificaciones = function() {
    if (!confirm('¿Limpiar notificaciones?')) return;
    const TOKEN = localStorage.getItem('token');
    fetch('http://localhost:5000/api/notifications/clear',{method:'POST',headers:{Authorization:`Bearer ${TOKEN}`}})
      .then(r=>r.json()).then(d=>{ if(d.ok) cargarNotiPanel(); });
  };

  // Cerrar menus al click fuera
  document.addEventListener('click', e => {
    if (!e.target.closest('.dropdown')) {
      const m = document.getElementById('userDropdown');
      if (m) m.style.display = 'none';
    }
  });

  // Cargar count al inicio
  cargarNotiPanel();
  setInterval(cargarNotiPanel, 15000);
})();
</script>
