<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="theme.css">
  <script src="theme-init.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Producto</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"> <!-- Font Awesome -->
  <style>
/* ===== BASE ===== */
body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  padding-top: 80px;
  background: var(--page-bg-inv);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== MAIN SECTION ===== */
.main-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 16px;
  position: relative;
  z-index: 1;
}

.main-section h1 {
  margin-bottom: 24px;
  color: var(--text);
  font-weight: 700;
  letter-spacing: 0.5px;
}

/* ===== FORM CARD (GLASS STYLE) ===== */
form {
  width: 100%;
  max-width: 720px; /* ⬅️ más presencia */
  background: var(--glass-bg);
  backdrop-filter: blur(14px) saturate(180%);
  -webkit-backdrop-filter: blur(14px) saturate(180%);
  border: 3px solid var(--glass-border);
  border-radius: 20px;
  padding: 36px 32px; /* ⬅️ más aire interno */
  box-shadow: var(--glass-shadow);
}

/* ===== LABELS ===== */
label {
  margin-top: 14px;
  margin-bottom: 6px;
  font-size: 1.1em;
  font-weight: 600;
  color: var(--text);
}

/* ===== INPUTS ===== */
input,
textarea {
  width: 100%;
  padding: 12px 0px;
  border-radius: 10px;
  border: 1.8px solid var(--input-border-inv);
  font-size: 0.95em;
  outline: none;
  background: var(--input-bg-inv);
  transition: border 0.25s, box-shadow 0.25s;
}

textarea {
  resize: vertical;
  min-height: 90px;
}

input:focus,
textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}

/* ===== ANIMATION ===== */
@keyframes cardIn {
  from {
    opacity: 0;
    transform: translateY(40px) scale(0.96);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* ===== BUBBLES (MISMO FONDO QUE INVENTARIO) ===== */
.bubble {
  position: absolute;
  border-radius: 50%;
  opacity: 0.13;
  filter: blur(2px);
  animation: floatBubble 12s infinite linear;
  z-index: 0;
}

@keyframes floatBubble {
  from {
    transform: translateY(0) scale(1);
  }
  to {
    transform: translateY(-120vh) scale(1.2);
  }
}
/* ===== HEADER ===== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  background-color: var(--header-bg);
  color: var(--text);
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 1000;
  box-shadow: var(--shadow-xs);
}

/* ===== BUTTON ===== */
.btn-crear-producto {
  margin-top: 22px;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-size: 1em;
  font-weight: 700;
  color: #fff;
  background: var(--gradient);
  cursor: pointer;
  box-shadow: 0 6px 18px var(--primary-glow);
  transition: transform 0.25s, box-shadow 0.25s, opacity 0.25s;
  width: 100%;
}

.btn-crear-producto:hover {
  transform: translateY(-1px) scale(1.02);   /* más presencia */
  background: var(--gradient);
  box-shadow: 0 14px 36px var(--primary-glow);
  opacity: 0.98;
}

  </style>
</head>
<body>

  <div id="header-container" style="width:100%;position:fixed;top:0;left:0;z-index:1000 !important;"></div>

  <section class="main-section">
    <h1>Crear Producto</h1>
    <form id="crearProductoForm">
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" name="nombre" required>
      
      <label for="descripcion">Descripción:</label>
      <textarea id="descripcion" name="descripcion" required></textarea>
      
      <label for="cantidad">Cantidad:</label>
      <input type="number" id="cantidad" name="cantidad" required>
      
      <label for="precio">Precio:</label>
      <input type="number" step="0.01" id="precio" name="precio" required>

      <label for="codigo_barras">Codigo de Barras:</label>
      <input type="text" id="codigo_barras" name="codigo_barras">
      
      <button type="submit" class="btn-crear-producto">
  Crear Producto
</button>

    </form>
  </section>

      <script>
    // Cargar header global
    document.addEventListener('DOMContentLoaded', function() {
      fetch('header.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('header-container').innerHTML = html;
          // Ejecutar los scripts del header
          const scripts = document.getElementById('header-container').querySelectorAll('script');
          scripts.forEach(script => {
            const newScript = document.createElement('script');
            if (script.src) {
              newScript.src = script.src;
            } else {
              newScript.textContent = script.textContent;
            }
            document.body.appendChild(newScript);
          });
        });
    });
  </script>


  <script src="js/scripts.js"></script> <!-- Enlace al archivo JS -->
  <script>

    document.getElementById('crearProductoForm').addEventListener('submit', function(event) {
      event.preventDefault();
      
      const nombre = document.getElementById('nombre').value;
      const descripcion = document.getElementById('descripcion').value;
      const cantidad = document.getElementById('cantidad').value;
      const precio = document.getElementById('precio').value;
      const codigo_barras = document.getElementById('codigo_barras').value;
      
      fetch('http://localhost:5000/api/inventory/create', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          nombre: nombre,
          descripcion: descripcion,
          cantidad: cantidad,
          precio: precio,
          codigo_barras: codigo_barras
        })
      })
      .then(response => response.json())
      .then(data => {
        alert(data.message);
        window.location.href = 'inventario.html';
      })
      .catch(error => {
        console.error('Error:', error);
      });
    });
  </script>
</body>
</html>
