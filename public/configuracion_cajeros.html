<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="theme.css">
  <script src="theme-init.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración de Cajeros</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Roboto', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding-top: 80px;
}

.main-section {
    padding: 24px;
    max-width: 1200px;
    margin: 0 auto;
}

.page-header {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 24px;
    box-shadow: var(--shadow-sm);
}

.page-title {
    font-size: 2.2em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
}

.page-title i {
    color: var(--color-excel);
}

.actions-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
}

.btn-primary {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    background: var(--gradient);
    color: white;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: var(--shadow-sm);
    transition: all 0.3s;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.btn-secondary {
    padding: 12px 24px;
    border: 2px solid var(--color-excel);
    border-radius: 8px;
    background: var(--card-bg);
    color: var(--color-excel);
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s;
}

.btn-secondary:hover {
    background: rgba(var(--warning-rgb),0.08);
}

.tabla-card {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 24px;
    box-shadow: var(--shadow-sm);
}

table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: var(--gradient);
}

th {
    padding: 14px 12px;
    text-align: left;
    color: white;
    font-weight: 600;
    font-size: 0.9em;
    text-transform: uppercase;
}

td {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
}

tbody tr:hover {
    background: rgba(var(--warning-rgb),0.08);
}

.badge {
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 0.85em;
    font-weight: 600;
}

.badge-activo {
    background: rgba(var(--primary-rgb),0.1);
    color: var(--success);
}

.badge-inactivo {
    background: rgba(var(--danger-rgb),0.1);
    color: var(--danger);
}

.btn-icon {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin: 0 4px;
    transition: all 0.2s;
}

.btn-editar {
    background: var(--color-editar);
    color: white;
}

.btn-eliminar {
    background: var(--color-eliminar);
    color: white;
}

.btn-icon:hover {
    transform: scale(1.1);
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--modal-overlay);
    z-index: 9999;
    align-items: center;
    justify-content: center;
}

.modal.active {
    display: flex;
}

.modal-content {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 32px;
    max-width: 500px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
}

.modal-title {
    font-size: 1.5em;
    color: var(--text);
    font-weight: 700;
}

.btn-close {
    background: none;
    border: none;
    font-size: 1.5em;
    cursor: pointer;
    color: var(--text-muted);
}

.form-group {
    margin-bottom: 16px;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    color: var(--text);
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 1em;
    transition: all 0.2s;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--color-excel);
    box-shadow: 0 0 0 3px rgba(var(--warning-rgb),0.15);
}

.modal-actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
}

.form-help {
    font-size: 0.85em;
    color: var(--text-muted);
    margin-top: 4px;
}

.info-box {
    background: rgba(var(--secondary-rgb),0.08);
    border-left: 4px solid var(--color-editar);
    padding: 12px;
    margin-bottom: 16px;
    border-radius: 4px;
    font-size: 0.9em;
    color: var(--color-editar);
}
    </style>
</head>
<body>
    <div id="header-container"></div>
    
    <div class="main-section">
        <div class="page-header">
            <h1 class="page-title">
                <i class="fas fa-user-tie"></i>
                Configuración de Cajeros
            </h1>
            <p style="color: var(--text-muted);">Gestiona los cajeros del punto de venta</p>
        </div>
        
        <div class="actions-bar">
            <button onclick="window.location.href='config_general.html'" class="btn-secondary">
                <i class="fas fa-arrow-left"></i> Volver
            </button>
            <button onclick="abrirModalNuevo()" class="btn-primary">
                <i class="fas fa-plus"></i>
                Nuevo Cajero
            </button>
        </div>
        
        <div class="tabla-card">
            <table id="tabla-cajeros">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Usuario Vinculado</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Datos dinámicos -->
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Modal Cajero -->
    <div id="modal-cajero" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Nuevo Cajero</h2>
                <button onclick="cerrarModal()" class="btn-close">&times;</button>
            </div>
            
            <div class="info-box">
                <i class="fas fa-info-circle"></i>
                Para que un cajero pueda usar el sistema, debe estar vinculado a un usuario.
            </div>
            
            <form id="form-cajero" onsubmit="guardarCajero(event)">
                <input type="hidden" id="cajero_id">
                
                <div class="form-group">
                    <label for="nombre">Nombre Completo *</label>
                    <input type="text" id="nombre" required>
                </div>
                
                <div class="form-group">
                    <label for="usuario_id">Usuario del Sistema *</label>
                    <select id="usuario_id" required>
                        <option value="">Seleccionar usuario...</option>
                    </select>
                    <div class="form-help">El usuario se crea en la sección "Usuarios"</div>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email">
                </div>
                
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono">
                </div>
                
                <div class="form-group">
                    <label for="activo">Estado</label>
                    <select id="activo">
                        <option value="1">Activo</option>
                        <option value="0">Inactivo</option>
                    </select>
                </div>
                
                <div class="modal-actions">
                    <button type="button" onclick="cerrarModal()" class="btn-secondary" style="flex: 1;">
                        Cancelar
                    </button>
                    <button type="submit" class="btn-primary" style="flex: 1;">
                        <i class="fas fa-save"></i>
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        const API = 'http://localhost:5000';
        
        document.addEventListener('DOMContentLoaded', function() {
            fetch('header.html')
                .then(r => r.text())
                .then(html => {
                    document.getElementById('header-container').innerHTML = html;
                    const scripts = document.getElementById('header-container').querySelectorAll('script');
                    scripts.forEach(script => {
                        const newScript = document.createElement('script');
                        if (script.src) newScript.src = script.src;
                        else newScript.textContent = script.textContent;
                        document.body.appendChild(newScript);
                    });
                });
            
            cargarCajeros();
            cargarUsuarios();
        });
        
        function cargarCajeros() {
            fetch(`${API}/api/cajeros/all`)
                .then(r => r.json())
                .then(cajeros => {
                    const tbody = document.querySelector('#tabla-cajeros tbody');
                    tbody.innerHTML = '';
                    
                    if (cajeros.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 40px; color: var(--text-muted);">No hay cajeros registrados</td></tr>';
                        return;
                    }
                    
                    cajeros.forEach(cajero => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${cajero.id}</td>
                            <td>${cajero.nombre}</td>
                            <td>${cajero.username || '<span style="color: var(--text-muted);">Sin usuario</span>'}</td>
                            <td>${cajero.email || 'N/A'}</td>
                            <td>${cajero.telefono || 'N/A'}</td>
                            <td>
                                <span class="badge ${cajero.cajero_activo ? 'badge-activo' : 'badge-inactivo'}">
                                    ${cajero.cajero_activo ? 'Activo' : 'Inactivo'}
                                </span>
                            </td>
                            <td>
                                <button onclick="editarCajero(${cajero.id})" class="btn-icon btn-editar" title="Editar">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="eliminarCajero(${cajero.id})" class="btn-icon btn-eliminar" title="Eliminar">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(err => {
                    console.error('Error al cargar cajeros:', err);
                    alert('Error al cargar cajeros');
                });
        }
        
        function cargarUsuarios() {
            fetch(`${API}/api/usuarios/activos`)
                .then(r => r.json())
                .then(usuarios => {
                    const select = document.getElementById('usuario_id');
                    // Limpiar opciones excepto la primera
                    select.innerHTML = '<option value="">Seleccionar usuario...</option>';
                    
                    usuarios.forEach(usuario => {
                        const option = document.createElement('option');
                        option.value = usuario.id;
                        option.textContent = `${usuario.username} - ${usuario.nombre_completo || 'Sin nombre'}`;
                        select.appendChild(option);
                    });
                })
                .catch(err => console.error('Error al cargar usuarios:', err));
        }
        
        function abrirModalNuevo() {
            document.getElementById('modal-title').textContent = 'Nuevo Cajero';
            document.getElementById('form-cajero').reset();
            document.getElementById('cajero_id').value = '';
            document.getElementById('modal-cajero').classList.add('active');
        }
        
        function editarCajero(id) {
            fetch(`${API}/api/cajeros/${id}`)
                .then(r => r.json())
                .then(cajero => {
                    document.getElementById('modal-title').textContent = 'Editar Cajero';
                    document.getElementById('cajero_id').value = cajero.id;
                    document.getElementById('nombre').value = cajero.nombre;
                    document.getElementById('usuario_id').value = cajero.usuario_id || '';
                    document.getElementById('email').value = cajero.email || '';
                    document.getElementById('telefono').value = cajero.telefono || '';
                    document.getElementById('activo').value = cajero.activo;
                    document.getElementById('modal-cajero').classList.add('active');
                })
                .catch(err => {
                    console.error('Error al cargar cajero:', err);
                    alert('Error al cargar cajero');
                });
        }
        
        function guardarCajero(event) {
            event.preventDefault();
            
            const id = document.getElementById('cajero_id').value;
            const datos = {
                nombre: document.getElementById('nombre').value,
                usuario_id: document.getElementById('usuario_id').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                activo: document.getElementById('activo').value
            };
            
            const url = id ? `${API}/api/cajeros/update/${id}` : `${API}/api/cajeros/create-simple`;
            const method = id ? 'PUT' : 'POST';
            
            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            })
            .then(r => r.json())
            .then(result => {
                alert(result.message);
                cerrarModal();
                cargarCajeros();
            })
            .catch(err => {
                console.error('Error al guardar cajero:', err);
                alert('Error al guardar cajero');
            });
        }
        
        function eliminarCajero(id) {
            if (!confirm('¿Está seguro de desactivar este cajero?')) {
                return;
            }
            
            fetch(`${API}/api/cajeros/delete/${id}`, { method: 'DELETE' })
                .then(r => r.json())
                .then(result => {
                    alert(result.message);
                    cargarCajeros();
                })
                .catch(err => {
                    console.error('Error al eliminar cajero:', err);
                    alert('Error al eliminar cajero');
                });
        }
        
        function cerrarModal() {
            document.getElementById('modal-cajero').classList.remove('active');
        }
    </script>
</body>
</html>
