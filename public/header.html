<!-- ============================================================
   header.html — JCT POS v2
   Header global para páginas internas (ventas, clientes, etc.)
   ============================================================ -->


<style>
  /* ── Header ── */
  .app-header {
    position: fixed; top: 0; left: 0; right: 0; height: 64px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--header-border);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; z-index: 1000;
    box-shadow: var(--shadow-sm);
    transition: background .35s, border-color .35s;
  }

  /* ── Noti panel ── */
  #notiPanel {
    position: fixed; top: 64px; right: 0; bottom: 0; width: 340px;
    max-width: 92vw;
    background: var(--sidebar-bg);
    border-left: 1px solid var(--sidebar-border);
    display: flex; flex-direction: column;
    z-index: 3000;
    transform: translateX(100%);
    transition: transform .35s cubic-bezier(.23,1.01,.32,1);
    box-shadow: var(--shadow-lg);
  }
  #notiPanel.active { transform: translateX(0); }

  #notiOverlay {
    display: none; position: fixed; inset: 0;
    background: var(--modal-overlay);
    z-index: 2999;
    backdrop-filter: blur(2px);
  }
  #notiOverlay.active { display: block; }

  /* ── Header buttons ── */
  .h-btn {
    width: 38px; height: 38px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text-muted);
    font-size: .95em; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; position: relative;
  }
  .h-btn:hover { background: var(--bg4); color: var(--primary); border-color: var(--primary); transform: translateY(-1px); }

  .notif-dot {
    position: absolute; top: 7px; right: 7px;
    width: 7px; height: 7px;
    background: var(--danger); border-radius: 50%;
    border: 2px solid var(--header-bg);
  }

  /* ── Brand ── */
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .brand-icon {
    width: 36px; height: 36px;
    background: var(--gradient); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 1em; flex-shrink: 0;
    box-shadow: 0 3px 10px var(--primary-glow);
  }
  .brand-name { font-size: 1em; font-weight: 800; color: var(--text); letter-spacing: .3px; }

  /* ── User dropdown ── */
  .user-dropdown {
    position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--modal-bg); border: 1px solid var(--card-border);
    border-radius: 14px; box-shadow: var(--shadow-lg);
    min-width: 220px; overflow: hidden; z-index: 3100;
    animation: dropIn .2s ease;
    display: none;
  }
  .user-dropdown.open { display: block; }

  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .user-dropdown .ud-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .user-dropdown .ud-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--gradient);
    display: flex; align-items: center; justify-content: center;
    font-size: .85em; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .user-dropdown .ud-name { font-size: .88em; font-weight: 700; color: var(--text); }
  .user-dropdown .ud-role { font-size: .74em; color: var(--text-muted); }

  .user-dropdown .ud-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 16px; color: var(--text); font-size: .88em;
    cursor: pointer; transition: background .15s;
    border-bottom: 1px solid var(--border);
  }
  .user-dropdown .ud-item:last-child { border-bottom: none; }
  .user-dropdown .ud-item:hover { background: var(--bg3); color: var(--primary); }
  .user-dropdown .ud-item i { width: 16px; text-align: center; color: var(--text-muted); }
  .user-dropdown .ud-item.danger { color: var(--danger); }
  .user-dropdown .ud-item.danger i { color: var(--danger); }
  .user-dropdown .ud-item.danger:hover { background: rgba(var(--danger-rgb),.08); }

  /* ── Noti items ── */
  .noti-item-h {
    padding: 13px 18px; border-bottom: 1px solid var(--border);
    transition: background .15s; cursor: default;
  }
  .noti-item-h:hover { background: var(--sidebar-hover); }
  .noti-msg-h  { font-size: .84em; color: var(--text); margin-bottom: 3px; line-height: 1.5; }
  .noti-date-h { font-size: .74em; color: var(--text-muted); }

  /* ── Theme toggle spin on hover ── */
  .theme-toggle { transition: transform .3s !important; }
  .theme-toggle:hover { transform: rotate(22deg) !important; }
</style>

<!-- ===== HEADER ===== -->
<header class="app-header">

  <!-- Left: brand + back -->
  <div style="display:flex;align-items:center;gap:8px;">
    <button onclick="window.history.back()" class="h-btn" title="Volver" style="flex-shrink:0;">
      <i class="fas fa-arrow-left"></i>
    </button>
    <a href="menu_principal.html" class="brand">
      <div class="brand-icon"><i class="fas fa-cash-register"></i></div>
      <span class="brand-name">JCT POS</span>
    </a>
  </div>

  <!-- Right: theme + noti + user -->
  <div style="display:flex;align-items:center;gap:6px;">

    <!-- Toggle tema -->
    <button class="h-btn theme-toggle" title="Cambiar tema">
      <i class="fas fa-sun"></i>
    </button>

    <!-- Notificaciones -->
    <button class="h-btn" onclick="toggleNotiPanel()" title="Notificaciones">
      <i class="fas fa-bell"></i>
      <span class="notif-dot" id="notiDot" style="display:none;"></span>
    </button>

    <!-- Usuario -->
    <div style="position:relative;">
      <button class="h-btn" onclick="toggleUserDropdown()" title="Mi cuenta" id="userBtn">
        <i class="fas fa-user"></i>
      </button>
      <div class="user-dropdown" id="userDropdown">
        <div class="ud-header">
          <div class="ud-avatar" id="udAvatar">A</div>
          <div>
            <div class="ud-name" id="udName">Usuario</div>
            <div class="ud-role" id="udRole">Sistema POS</div>
          </div>
        </div>
        <div class="ud-item" onclick="location.href='config_general.html'">
          <i class="fas fa-cog"></i> Configuración
        </div>
        <div class="ud-item danger" onclick="cerrarSesion()">
          <i class="fas fa-sign-out-alt"></i> Cerrar sesión
        </div>
      </div>
    </div>

  </div>
</header>

<!-- ===== PANEL NOTIFICACIONES ===== -->
<div id="notiPanel">
  <!-- Header del panel -->
  <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <span style="font-weight:700;font-size:1em;color:var(--text);">
      <i class="fas fa-bell" style="color:var(--primary);margin-right:8px;"></i>Notificaciones
    </span>
    <button onclick="toggleNotiPanel()" class="h-btn" style="width:30px;height:30px;font-size:.9em;">&times;</button>
  </div>
  <!-- Lista -->
  <div id="notiPanelContent" style="flex:1;overflow-y:auto;"></div>
  <!-- Footer -->
  <div style="padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;">
    <button onclick="limpiarNotificaciones()" class="btn btn-secondary btn-block" style="font-size:.82em;">
      <i class="fas fa-broom"></i> Limpiar notificaciones
    </button>
  </div>
</div>
<div id="notiOverlay" onclick="toggleNotiPanel()"></div>

<script>
(function initHeaderGlobal() {
  /* ── Datos usuario ── */
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  const name = user.nombre || user.username || 'Usuario';
  const role = user.rol || 'Sistema POS';
  const el = document.getElementById('udName');
  const av = document.getElementById('udAvatar');
  const rl = document.getElementById('udRole');
  if (el) el.textContent = name;
  if (av) av.textContent = name.charAt(0).toUpperCase();
  if (rl) rl.textContent = role;

  /* ── Cerrar sesión ── */
  window.cerrarSesion = function () {
    const TOKEN = localStorage.getItem('token');
    fetch('http://localhost:5000/api/auth/logout', {
      method: 'POST', headers: { Authorization: `Bearer ${TOKEN}` }
    }).finally(() => {
      const theme = localStorage.getItem('jct_theme');
      localStorage.clear();
      sessionStorage.clear();
      if (theme) localStorage.setItem('jct_theme', theme);
      window.location.replace('login.html');
    });
  };

  /* ── User dropdown ── */
  window.toggleUserDropdown = function () {
    const d = document.getElementById('userDropdown');
    d.classList.toggle('open');
  };

  document.addEventListener('click', e => {
    if (!e.target.closest('#userBtn') && !e.target.closest('#userDropdown')) {
      const d = document.getElementById('userDropdown');
      if (d) d.classList.remove('open');
    }
  });

  /* ── Noti panel ── */
  let notiOpen = false;

  window.toggleNotiPanel = function () {
    notiOpen = !notiOpen;
    const panel   = document.getElementById('notiPanel');
    const overlay = document.getElementById('notiOverlay');
    panel.classList.toggle('active', notiOpen);
    overlay.classList.toggle('active', notiOpen);
    document.body.style.overflow = notiOpen ? 'hidden' : '';
    if (notiOpen) cargarNotiPanel();
  };

  function cargarNotiPanel() {
    fetch('http://localhost:5000/api/notifications/acciones')
      .then(r => r.json())
      .then(data => {
        const el  = document.getElementById('notiPanelContent');
        const dot = document.getElementById('notiDot');
        if (dot) dot.style.display = data.length ? 'block' : 'none';

        if (!data.length) {
          el.innerHTML = `<div style="text-align:center;padding:48px 20px;color:var(--text-muted);">
            <i class="fas fa-bell" style="font-size:2.5em;color:var(--text-faint);display:block;margin-bottom:12px;"></i>
            <p style="font-size:.88em;">Sin notificaciones</p></div>`;
          return;
        }

        const fmt = s => {
          const d = new Date(s), p = n => n < 10 ? '0' + n : n;
          return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
        };

        el.innerHTML = data.map(n => `
          <div class="noti-item-h">
            <div class="noti-msg-h">${n.mensaje}</div>
            <div class="noti-date-h">${fmt(n.fecha)}</div>
          </div>`).join('');
      })
      .catch(() => {
        document.getElementById('notiPanelContent').innerHTML =
          `<div style="text-align:center;padding:30px;color:var(--danger);font-size:.85em;">Error al cargar notificaciones</div>`;
      });
  }

  window.limpiarNotificaciones = function () {
    if (!confirm('¿Limpiar todas las notificaciones?')) return;
    fetch('http://localhost:5000/api/notifications/clear', { method: 'POST' })
      .then(r => r.json())
      .then(d => { if (d.ok) cargarNotiPanel(); });
  };

  /* ── Auto refresh ── */
  setInterval(cargarNotiPanel, 10000);
  cargarNotiPanel();
})();
</script>
