<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', Arial, sans-serif;
            overflow: hidden;
        }
        .glass-bg {
            background: rgba(255,255,255,0.18);
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.37);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 40px 32px 32px 32px;
            width: 340px;
            max-width: 90vw;
            text-align: center;
            animation: glassIn 1.1s cubic-bezier(.23,1.01,.32,1);
            position: relative;
        }
        @keyframes glassIn {
            0% { opacity: 0; transform: translateY(-60px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .logo img {
            width: 300px;
            filter: drop-shadow(0 2px 12px #fff8);
            margin-bottom: 18px;
            animation: logoPop 1.2s cubic-bezier(.23,1.01,.32,1);
        }
        @keyframes logoPop {
            0% { opacity: 0; transform: scale(0.7); }
            80% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }
        .glass-bg h1 {
            font-size: 2.1em;
            font-weight: 700;
            margin-bottom: 18px;
            color: #222;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px #fff6;
        }
        .glass-bg input {
            width: 100%;
            padding: 14px 16px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.55);
            font-size: 1.1em;
            box-shadow: 0 1px 6px #0001;
            outline: none;
            transition: box-shadow 0.3s, background 0.3s;
        }
        .glass-bg input:focus {
            background: rgba(255,255,255,0.8);
            box-shadow: 0 2px 12px #a8edea88;
        }
        .password-container {
            position: relative;
        }
        .password-container i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 26px;
            color: #7b7b7b;
            cursor: pointer;
            transition: color 0.2s;
        }
        .password-container i:hover {
            color: #222;
        }
        .glass-bg button {
            width: 100%;
            padding: 14px;
            margin-top: 18px;
            background: linear-gradient(90deg, #a8edea 0%, #fed6e3 100%);
            border: none;
            border-radius: 12px;
            color: #222;
            font-size: 1.1em;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 2px 12px #fed6e366;
            cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s, transform 0.2s;
            backdrop-filter: blur(2px);
        }
        .glass-bg button:hover {
            background: linear-gradient(90deg, #fed6e3 0%, #a8edea 100%);
            box-shadow: 0 4px 18px #a8edea66;
            transform: translateY(-2px) scale(1.03);
        }
        .glass-bg button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .error-message {
            color: #e74c3c;
            background: rgba(255,255,255,0.7);
            border-radius: 8px;
            padding: 6px 0;
            margin-top: 10px;
            font-size: 0.98em;
            display: none;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translateX(-2px); }
            20%, 80% { transform: translateX(4px); }
            30%, 50%, 70% { transform: translateX(-8px); }
            40%, 60% { transform: translateX(8px); }
        }
        .footer {
            background: none;
            color: #555;
            font-size: 13px;
            position: fixed;
            bottom: 12px;
            left: 0;
            width: 100vw;
            text-align: center;
            z-index: 10;
            letter-spacing: 0.5px;
        }
        .footer a { color: #222; text-decoration: underline; }
        /* Animación de fondo flotante */
        .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.25;
            filter: blur(2px);
            animation: floatBubble 12s infinite linear;
        }
        @keyframes floatBubble {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-120vh) scale(1.2); }
        }
    </style>
</head>
<body>
    <!-- Burbujas animadas de fondo -->
    <div class="bubble" style="width:120px;height:120px;left:10vw;bottom:-80px;background:#a8edea;"></div>
    <div class="bubble" style="width:80px;height:80px;left:60vw;bottom:-60px;background:#fed6e3;animation-delay:2s;"></div>
    <div class="bubble" style="width:100px;height:100px;left:80vw;bottom:-100px;background:#fff;animation-delay:4s;"></div>
    <div class="bubble" style="width:60px;height:60px;left:30vw;bottom:-40px;background:#a8edea;animation-delay:6s;"></div>

    <div class="glass-bg">
        <div class="logo">
            <img src="images/Logo2.png" alt="Logo de JCTechnology">
        </div>
        <h1>Inicio de Sesión</h1>
        <form id="loginForm" onsubmit="event.preventDefault(); iniciarSesion();">
            <div style="width:100%;display:flex;flex-direction:column;align-items:center;gap:0;">
                <div style="width:100%;margin:0 0 12px 0;display:flex;align-items:center;position:relative;">
                    <input type="text" id="username" placeholder="Usuario" required autocomplete="username" style="width:100%;margin:0;">
                </div>
                <div class="password-container" style="width:100%;margin:0;display:flex;align-items:center;position:relative;">
                    <input type="password" id="password" placeholder="Contraseña" required autocomplete="current-password" style="width:100%;margin:0;">
                    <i class="material-icons" id="togglePassword" onclick="togglePassword()" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);">visibility</i>
                </div>
            </div>
            <button type="submit" id="btnLogin">Conectar</button>
        </form>
        <p id="mensaje" class="error-message">Credenciales incorrectas</p>
    </div>

    <div class="footer">
        <p>&copy; 2026. All rights reserved. Created by <a href="https://www.instagram.com/jonuel_collado/" target="_blank">JCT22</a></p>
    </div>

    <script>
        const API = 'http://localhost:5000';

        // ===== VERIFICAR SI YA HAY SESIÓN ACTIVA =====
        window.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (token) {
                // Si ya hay sesión activa, redirigir al menú principal
                window.location.replace('menu_principal.html');
            }
        });

        // ===== TOGGLE PASSWORD VISIBILITY =====
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePassword');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        // ===== FUNCIÓN DE INICIO DE SESIÓN =====
        function iniciarSesion() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const mensaje = document.getElementById('mensaje');
            const btnLogin = document.getElementById('btnLogin');

            // Validación básica
            if (!username || !password) {
                mensaje.textContent = 'Por favor, complete todos los campos';
                mensaje.style.display = 'block';
                setTimeout(() => mensaje.style.display = 'none', 3000);
                return;
            }

            // Deshabilitar botón mientras se procesa
            btnLogin.disabled = true;
            btnLogin.textContent = 'Conectando...';

            // Realizar petición de login
            fetch(`${API}/api/auth/login`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    username: username, 
                    password: password 
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Credenciales incorrectas');
                }
                return response.json();
            })
            .then(data => {
                if (data.token) {
                    // Limpiar cualquier sesión anterior
                    localStorage.clear();
                    sessionStorage.clear();
                    
                    // Guardar nuevo token
                    localStorage.setItem('token', data.token);
                    
                    // Guardar información adicional si viene en la respuesta
                    if (data.user) {
                        localStorage.setItem('user', JSON.stringify(data.user));
                    }
                    
                    // Mostrar mensaje de éxito
                    mensaje.style.color = '#27ae60';
                    mensaje.style.background = 'rgba(255,255,255,0.9)';
                    mensaje.textContent = '¡Bienvenido! Redirigiendo...';
                    mensaje.style.display = 'block';
                    
                    // Redirigir usando replace para no dejar en el historial
                    setTimeout(() => {
                        window.location.replace('menu_principal.html');
                    }, 800);
                } else {
                    throw new Error('No se recibió token de autenticación');
                }
            })
            .catch(error => {
                console.error('Error en login:', error);
                
                // Mostrar mensaje de error
                mensaje.style.color = '#e74c3c';
                mensaje.style.background = 'rgba(255,255,255,0.7)';
                mensaje.textContent = error.message || 'Credenciales incorrectas';
                mensaje.style.display = 'block';
                
                // Ocultar mensaje después de 3 segundos
                setTimeout(() => mensaje.style.display = 'none', 3000);
                
                // Rehabilitar botón
                btnLogin.disabled = false;
                btnLogin.textContent = 'Conectar';
            });
        }

        // ===== PERMITIR LOGIN CON ENTER =====
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                iniciarSesion();
            }
        });

        // ===== PREVENIR DOBLE SUBMIT =====
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
        });
    </script>

    <!-- Cargar scripts.js si existe -->
    <script src="js/scripts.js"></script>
</body>
</html>
