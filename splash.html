<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Iniciando...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    .logo-wrap {
      margin-bottom: 32px;
      animation: fadeIn 0.8s ease;
    }

    .logo-wrap img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(99,179,237,0.3);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #63b3ed;
      margin-bottom: 8px;
      animation: fadeIn 0.8s ease 0.2s both;
    }

    p {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-bottom: 40px;
      animation: fadeIn 0.8s ease 0.4s both;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(99,179,237,0.2);
      border-top-color: #63b3ed;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .status {
      margin-top: 24px;
      font-size: 0.85rem;
      color: #64748b;
      animation: fadeIn 0.8s ease 0.6s both;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="LOGO.jpg" alt="Logo" onerror="this.style.display='none'" />
  </div>
  <h1>Punto de Venta</h1>
  <p>JCTechnology</p>
  <div class="spinner"></div>
  <div class="status">Iniciando servidor, por favor espere...</div>
</body>
</html>
