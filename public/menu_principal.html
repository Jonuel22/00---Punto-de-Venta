<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JCT POS — Dashboard</title>
<script src="theme-init.js"></script>
<link rel="stylesheet" href="theme.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  .dashboard-layout{display:flex;padding-top:64px;min-height:100vh;}
  .main-content{flex:1;padding:24px;overflow-y:auto;margin-right:320px;transition:margin .3s;}
  @media(max-width:1024px){.main-content{margin-right:0;}}
  @media(max-width:768px){.main-content{padding:14px;}}

  .user-chip{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .2s;text-decoration:none;}
  .user-chip:hover{background:var(--bg4);border-color:var(--primary);}
  .user-avatar{width:28px;height:28px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:.75em;font-weight:700;color:#fff;flex-shrink:0;}
  .user-name{font-size:.82em;font-weight:600;color:var(--text);}

  .greeting{margin-bottom:24px;animation:fadeUp .4s ease both;}
  .greeting h2{font-size:1.5em;font-weight:800;margin-bottom:4px;}
  .greeting p {font-size:.88em;color:var(--text-muted);}

  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
  @media(max-width:900px){.charts-grid{grid-template-columns:1fr;}}

  /* Tile disabled */
  .tile.disabled{opacity:.35;cursor:not-allowed;pointer-events:none;}
  .tile.disabled:hover{transform:none;box-shadow:var(--shadow-sm);}
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <a href="menu_principal.html" class="brand">
    <div class="brand-icon"><i class="fas fa-cash-register"></i></div>
    <span class="brand-name">JCT POS</span>
  </a>
  <div class="header-actions">
    <button class="theme-toggle h-btn" title="Cambiar tema"><i class="fas fa-sun"></i></button>
    <div style="position:relative;">
      <div class="user-chip" onclick="toggleUserMenu()">
        <div class="user-avatar" id="userInitial">A</div>
        <span class="user-name" id="userName">Usuario</span>
        <i class="fas fa-chevron-down" style="font-size:.65em;color:var(--text-muted);margin-left:2px;"></i>
      </div>
      <div class="dropdown-panel" id="userMenu" style="display:none;">
        <div style="padding:14px 16px;border-bottom:1px solid var(--border);">
          <div style="font-weight:700;font-size:.9em;color:var(--text);" id="userMenuName"></div>
          <div style="font-size:.76em;color:var(--text-muted);margin-top:2px;" id="userMenuRol"></div>
        </div>
        <div class="dropdown-item" onclick="location.href='config_general.html'">
          <i class="fas fa-cog"></i> Configuración
        </div>
        <div class="dropdown-item danger" onclick="cerrarSesion()">
          <i class="fas fa-sign-out-alt"></i> Cerrar sesión
        </div>
      </div>
    </div>
  </div>
</header>

<div class="dashboard-layout">
  <!-- MAIN -->
  <main class="main-content">

    <!-- Greeting -->
    <div class="greeting">
      <h2>Bienvenido, <span class="gradient-text" id="greetName">Admin</span> 👋</h2>
      <p id="greetDate">Cargando fecha...</p>
    </div>

    <!-- KPIs -->
    <div class="stats-grid stagger mb-24">
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-boxes"></i></div>
        <div><div class="stat-label">Productos en Stock</div><div class="stat-value" id="kpiStock">—</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon danger"><i class="fas fa-exclamation-triangle"></i></div>
        <div><div class="stat-label">Productos Agotados</div><div class="stat-value text-danger" id="kpiAgotados">—</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon info"><i class="fas fa-chart-line"></i></div>
        <div><div class="stat-label">Ventas del Mes</div><div class="stat-value" id="kpiMes">—</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon secondary"><i class="fas fa-shopping-cart"></i></div>
        <div><div class="stat-label">Ventas Hoy</div><div class="stat-value text-primary" id="kpiHoy">—</div></div>
      </div>
    </div>

    <!-- Navegación por tiles — se filtran por permisos -->
    <div class="tiles-grid stagger mb-24" id="tilesGrid">
      <!-- Se renderizan dinámicamente según permisos -->
    </div>

    <!-- Gráficos -->
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title"><i class="fas fa-trophy"></i> Top Productos Vendidos</div>
        <div class="chart-body"><canvas id="chartProductos"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title"><i class="fas fa-chart-area"></i> Ventas Diarias del Mes</div>
        <div class="chart-body"><canvas id="chartVentas"></canvas></div>
      </div>
    </div>

  </main>

  <!-- SIDEBAR NOTIFICACIONES -->
  <aside class="noti-sidebar">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);">
      <div class="noti-tabs">
        <button class="noti-tab active" onclick="cambiarTab('acciones',this)">Acciones</button>
        <button class="noti-tab" onclick="cambiarTab('alertas',this)">Alertas</button>
      </div>
    </div>
    <div class="noti-list" id="notiContent" style="flex:1;overflow-y:auto;">
      <div class="noti-empty"><i class="fas fa-bell"></i><p style="font-size:.85em;">Sin notificaciones</p></div>
    </div>
    <div class="noti-kpi-section">
      <div class="noti-kpi-title">Resumen del Día</div>
      <div class="noti-kpi-card"><div class="nk-label">Ventas</div><div class="nk-value" id="kpiVentasSide">RD$ 0.00</div></div>
      <div class="noti-kpi-card"><div class="nk-label">Transacciones</div><div class="nk-value" id="kpiTransSide">0</div></div>
      <div class="noti-kpi-card"><div class="nk-label">Ticket Promedio</div><div class="nk-value" id="kpiTicketSide">RD$ 0.00</div></div>
      <button onclick="limpiarNotificaciones()" class="btn btn-secondary btn-block mt-16" style="font-size:.82em;">
        <i class="fas fa-broom"></i> <span id="btnLimpiarTxt">Limpiar acciones</span>
      </button>
    </div>
  </aside>
</div>

<script>
const API   = 'http://localhost:5000';
const TOKEN = localStorage.getItem('token');
let chartP=null, chartV=null, tabActual='acciones';

/* ── Mosaicos principales del dashboard ── */
const TODAS_TILES = [
  { pagina:'ventas.html',       label:'Ventas',        icono:'fa-cash-register', grupo:'operaciones' },
  { pagina:'inventario.html',   label:'Inventario',    icono:'fa-boxes',         grupo:'operaciones' },
  { pagina:'clientes.html',     label:'Clientes',      icono:'fa-users',         grupo:'operaciones' },
  { pagina:'reportes.html',     label:'Reportes',      icono:'fa-chart-bar',     grupo:'reportes'    },
  { pagina:'config_general.html', label:'Configuración', icono:'fa-cog',         grupo:'config'      },
];

/* ── Greeting ── */
(function initGreeting(){
  const user=JSON.parse(localStorage.getItem('user')||'{}');
  const name=user.nombre||user.username||'Usuario';
  const rol =user.rol||'';
  document.getElementById('greetName').textContent=name;
  document.getElementById('userName').textContent=name;
  document.getElementById('userInitial').textContent=name.charAt(0).toUpperCase();
  document.getElementById('userMenuName').textContent=name;
  document.getElementById('userMenuRol').textContent=rol.charAt(0).toUpperCase()+rol.slice(1);
  const days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const now=new Date();
  document.getElementById('greetDate').textContent=`${days[now.getDay()]}, ${now.getDate()} de ${months[now.getMonth()]} ${now.getFullYear()}`;
})();

/* ── Renderizar tiles según permisos ── */
function renderTilesConPermisos(permisos){
  const user=JSON.parse(localStorage.getItem('user')||'{}');
  const esAdmin=user.rol==='admin';
  const grid=document.getElementById('tilesGrid');

  const tilesVisibles=TODAS_TILES.filter(t=>{
    if(esAdmin && !user.rol_id) return true;
    return permisos.includes(t.pagina);
  });

  if(!tilesVisibles.length){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">
      <i class="fas fa-lock" style="font-size:2em;color:var(--text-faint);display:block;margin-bottom:12px;"></i>
      <p>Sin módulos asignados. Contacta al administrador.</p></div>`;
    return;
  }

  grid.innerHTML=tilesVisibles.map((t,i)=>`
    <a href="${t.pagina}" class="tile" style="animation-delay:${i*.05}s;">
      <div class="tile-icon"><i class="fas ${t.icono}"></i></div>
      <div class="tile-label">${t.label}</div>
    </a>`).join('');
}

async function renderTiles(){
  const user=JSON.parse(localStorage.getItem('user')||'{}');
  const esAdmin=user.rol==='admin';

  if(esAdmin && !user.rol_id){ renderTilesConPermisos([]); return; }

  try{
    const res=await fetch(`${API}/api/roles/usuario/${user.id}`,{headers:{Authorization:`Bearer ${TOKEN}`}});
    if(res.ok){
      const permisos=await res.json();
      user.permisos=permisos;
      localStorage.setItem('user',JSON.stringify(user));
      renderTilesConPermisos(permisos);
    } else {
      renderTilesConPermisos(user.permisos||[]);
    }
  } catch(e){
    renderTilesConPermisos(user.permisos||[]);
  }
}

/* ── User menu ── */
function toggleUserMenu(){
  const m=document.getElementById('userMenu');
  m.style.display=m.style.display==='block'?'none':'block';
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.user-chip')&&!e.target.closest('#userMenu')){
    const m=document.getElementById('userMenu');
    if(m)m.style.display='none';
  }
});

/* ── Cerrar sesión ── */
function cerrarSesion(){
  fetch(`${API}/api/auth/logout`,{method:'POST',headers:{Authorization:`Bearer ${TOKEN}`}})
    .finally(()=>{localStorage.clear();sessionStorage.clear();window.location.replace('login.html');});
}

/* ── Helpers ── */
function fmtRD(n){return'RD$ '+parseFloat(n||0).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2});}

/* ── KPIs ── */
function cargarKPIs(){
  fetch(`${API}/api/sales/kpi`,{headers:{Authorization:`Bearer ${TOKEN}`}})
    .then(r=>r.json()).then(d=>{
      const v=parseFloat(d.total||0),t=parseInt(d.transacciones||0);
      document.getElementById('kpiHoy').textContent=fmtRD(v);
      document.getElementById('kpiVentasSide').textContent=fmtRD(v);
      document.getElementById('kpiTransSide').textContent=t;
      document.getElementById('kpiTicketSide').textContent=fmtRD(t>0?v/t:0);
    }).catch(()=>{});

  fetch(`${API}/api/inventory/all`,{headers:{Authorization:`Bearer ${TOKEN}`}})
    .then(r=>r.json()).then(ps=>{
      document.getElementById('kpiStock').textContent=ps.filter(p=>p.cantidad>0).length;
      document.getElementById('kpiAgotados').textContent=ps.filter(p=>p.cantidad<=0).length;
    }).catch(()=>{});

  fetch(`${API}/api/sales/daily-month`,{headers:{Authorization:`Bearer ${TOKEN}`}})
    .then(r=>r.json()).then(d=>{
      document.getElementById('kpiMes').textContent=fmtRD(d.reduce((s,x)=>s+parseFloat(x.total),0));
    }).catch(()=>{});
}

/* ── Notificaciones ── */
function cambiarTab(tab,btn){
  tabActual=tab;
  document.querySelectorAll('.noti-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('btnLimpiarTxt').textContent=tab==='acciones'?'Limpiar acciones':'Limpiar alertas';
  cargarNotis(tab);
}

function cargarNotis(tipo='acciones'){
  const ep=tipo==='acciones'?`${API}/api/notifications/acciones`:`${API}/api/notifications/alertas`;
  fetch(ep).then(r=>r.json()).then(data=>{
    const el=document.getElementById('notiContent');
    if(!data.length){
      el.innerHTML=`<div class="noti-empty"><i class="fas fa-bell"></i><p style="font-size:.85em;">Sin ${tipo==='acciones'?'acciones':'alertas'}</p></div>`;
      return;
    }
    const fmt=s=>{const d=new Date(s),p=n=>n<10?'0'+n:n;return`${p(d.getDate())}/${p(d.getMonth()+1)} ${p(d.getHours())}:${p(d.getMinutes())}`;};
    el.innerHTML=data.map(n=>`<div class="noti-item"><div class="noti-msg">${n.mensaje}</div><div class="noti-date">${fmt(n.fecha)}</div></div>`).join('');
  }).catch(()=>{});
}

function limpiarNotificaciones(){
  if(tabActual==='alertas'){alert('Las alertas se generan automáticamente.');return;}
  if(!confirm('¿Limpiar todas las acciones?'))return;
  fetch(`${API}/api/notifications/clear`,{method:'POST',headers:{Authorization:`Bearer ${TOKEN}`}})
    .then(r=>r.json()).then(d=>{if(d.ok)cargarNotis(tabActual);});
}

/* ── Gráficos ── */
function chartColors(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  return{
    grid:dark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)',
    tick:dark?'#8b949e':'#4b5563',
    green:'rgba(0,204,102,0.8)',greenB:'#00cc66',
    fill:dark?'rgba(0,204,102,0.08)':'rgba(0,204,102,0.06)'
  };
}

function cargarGraficoProductos(){
  fetch(`${API}/api/sales/top-selling`,{headers:{Authorization:`Bearer ${TOKEN}`}})
    .then(r=>r.json()).then(data=>{
      const ctx=document.getElementById('chartProductos').getContext('2d');
      if(chartP)chartP.destroy();
      const c=chartColors();
      chartP=new Chart(ctx,{type:'bar',data:{labels:data.map(p=>p.nombre),datasets:[{label:'Vendidos',data:data.map(p=>p.cantidad),backgroundColor:c.green,borderColor:c.greenB,borderWidth:2,borderRadius:6}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,grid:{color:c.grid},ticks:{color:c.tick,precision:0}},y:{grid:{display:false},ticks:{color:c.tick}}}}});
    }).catch(()=>{});
}

function cargarGraficoVentas(){
  fetch(`${API}/api/sales/daily-month`,{headers:{Authorization:`Bearer ${TOKEN}`}})
    .then(r=>r.json()).then(data=>{
      const ctx=document.getElementById('chartVentas').getContext('2d');
      if(chartV)chartV.destroy();
      const hoy=new Date(),dias=new Date(hoy.getFullYear(),hoy.getMonth()+1,0).getDate();
      const map={};data.forEach(d=>map[d.dia]=parseFloat(d.total));
      const labels=[],vals=[];
      for(let i=1;i<=dias;i++){labels.push(i);vals.push(map[i]||0);}
      const c=chartColors();
      chartV=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'RD$',data:vals,backgroundColor:c.fill,borderColor:c.greenB,borderWidth:2.5,fill:true,tension:.4,pointRadius:3,pointBackgroundColor:c.greenB,pointBorderColor:'var(--bg)',pointBorderWidth:2,pointHoverRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:ctx=>`Día ${ctx[0].label}`,label:ctx=>'RD$ '+ctx.parsed.y.toLocaleString('es-DO',{minimumFractionDigits:2})}}},scales:{x:{grid:{color:c.grid},ticks:{color:c.tick,maxTicksLimit:10}},y:{beginAtZero:true,grid:{color:c.grid},ticks:{color:c.tick,callback:v=>'$'+v.toLocaleString('es-DO')}}}}});
    }).catch(()=>{});
}

window.addEventListener('themechange',()=>{
  cargarGraficoProductos();cargarGraficoVentas();
});

/* ── Iniciar ── */
renderTiles();
cargarKPIs();
cargarNotis();
cargarGraficoProductos();
cargarGraficoVentas();
setInterval(()=>{cargarKPIs();cargarNotis(tabActual);},30000);
</script>
</body>
</html>
