<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ventas</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: #b2d0e0;
      margin: 0;
      padding-top: 80px;
      min-height: 100vh;
    }
    .main-section {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      padding: 32px 28px 24px 28px;
      border-radius: 18px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
      position: relative;
    }
    h1 {
      font-size: 2.2em;
      font-weight: 700;
      color: #1769aa;
      margin-bottom: 18px;
      letter-spacing: 1px;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      position: relative;
    }
    .search-box input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #bcdffb;
      font-size: 1.1em;
      background: #f7fbff;
      transition: border 0.2s;
    }
    .search-box input:focus {
      border: 1.5px solid #1769aa;
      outline: none;
    }
    .search-box button {
      margin-bottom: auto;
      background: #1769aa;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 1.2em;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(33,150,243,0.08);
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .search-box button:hover {
      background: #114d7c;
    }
    #resultadosBusqueda {
      background: #fff;
      border: 1px solid #bcdffb;
      position: absolute;
      top: 45px;
      left: 0;
      right: 0;
      z-index: 20;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(33,150,243,0.08);
      max-height: 220px;
      overflow-y: auto;
    }
    #resultadosBusqueda div {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 1.05em;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.2s;
    }
    #resultadosBusqueda div:hover {
      background: #eaf2fb;
    }
    #resultadosBusqueda div[style*='color:#f44336'] {
      background: #ffeaea;
      color: #f44336 !important;
    }
    form {
      margin-top: 18px;
      background: #f7fbff;
      border-radius: 12px;
      padding: 18px 20px 10px 20px;
      box-shadow: 0 2px 8px rgba(33,150,243,0.06);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 18px;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(33,150,243,0.04);
    }
    th, td {
      border: none;
      padding: 12px 8px;
      text-align: left;
      font-size: 1em;
      vertical-align: middle;
    }
    th {
      background: #eaf2fb;
      color: #1769aa;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    tr:nth-child(even) td {
      background: #f7fbff;
    }
    .totals {
      text-align: right;
      margin-top: 10px;
      font-size: 1.15em;
      color: #1769aa;
    }
    label {
      display: block;
      margin: 12px 0 6px 0;
      font-weight: 500;
      color: #1769aa;
      font-size: 1.08em;
    }
    input[type="text"], input[type="number"] {
      padding: 10px 0px;
      border-radius: 7px;
      border: 1px solid #bcdffb;
      font-size: 1em;
      background: #fff;
      margin-bottom: 10px;
      transition: border 0.2s;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border: 1.5px solid #1769aa;
      outline: none;
    }
    .btn {
      padding: 12px 24px;
      background: #1769aa;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1em;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(33,150,243,0.08);
      margin-top: 10px;
      transition: background 0.2s;
      display: inline-block;
    }
    .btn:hover {
      background: #114d7c;
    }
    .btn[disabled] {
      background: #bcdffb;
      color: #888;
      cursor: not-allowed;
    }
    .icon-btn {
      background: none;
      border: none;
      color: #f44336;
      font-size: 1.3em;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover {
      background: #ffeaea;
      color: #b71c1c;
    }
    #mensajeVenta, #mensajeError {
      position: fixed;
      top: 90px;
      right: 30px;
      left: auto;
      background: #fff;
      color: #1769aa;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(33,150,243,0.12);
      padding: 18px 32px;
      font-size: 1.15em;
      font-weight: 600;
      z-index: 2000;
      border-left: 6px solid #1769aa;
      display: none;
    }
    #mensajeError {
      color: #f44336;
      border-left: 6px solid #f44336;
      background: #fff0f0;
    }
    #modalFactura, #modalProductos {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(33,150,243,0.08);
      z-index: 4000;
    }
    #modalFactura > div, #modalProductos > div {
      background: #fff;
      max-width: 600px;
      margin: 60px auto;
      padding: 28px 24px;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(33,150,243,0.12);
      position: relative;
      animation: modalFadeIn 0.3s;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #cerrarModalFactura, #cerrarModal {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 1.5em;
      background: none;
      border: none;
      color: #1769aa;
      cursor: pointer;
      transition: color 0.2s;
    }
    #cerrarModalFactura:hover, #cerrarModal:hover {
      color: #f44336;
    }
    #modalFacturaContent h2 {
      text-align: center;
      color: #1769aa;
      margin-bottom: 12px;
    }
    #modalFacturaContent table {
      margin-top: 10px;
      font-size: 1em;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(33,150,243,0.04);
    }
    #modalFacturaContent th {
      background: #eaf2fb;
      color: #1769aa;
      font-weight: 700;
    }
    #modalFacturaContent td {
      background: #fff;
      color: #333;
    }
    #modalFacturaContent .totals {
      margin-top: 12px;
      font-size: 1.1em;
      color: #1769aa;
      text-align: right;
    }
    #modalFacturaContent .btn {
      margin-top: 18px;
      width: 100%;
      font-size: 1.1em;
    }
    #modalConfirmacion {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.3);
      z-index: 5000;
    }
    #modalConfirmacion > div {
      background: #fff;
      max-width: 350px;
      margin: 120px auto;
      padding: 24px 20px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(33, 150, 243, 0.18);
      position: relative;
      text-align: center;
    }
    #modalConfirmacion h3 {
      color: #1769aa;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div id="header-container"></div>
  <section class="main-section">
    <h1>Registrar Venta</h1>
    <div class="search-box">
      <input type="text" id="buscarProducto" placeholder="Buscar producto por nombre o código..." style="width:60%;">
      <button type="button" id="btnLupa" style="margin-left:5px;"><i class="fas fa-search"></i></button>
      <div id="resultadosBusqueda" style="background:#fafafa; border:1px solid #ccc; position:absolute; z-index:10;"></div>
    </div>
    <div id="modalProductos" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.3);z-index:3000;">
      <div style="background:#fff;max-width:500px;margin:60px auto;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.2);position:relative;">
        <button id="cerrarModal" style="position:absolute;top:10px;right:10px;font-size:1.2em;">&times;</button>
        <h3>Todos los productos</h3>
        <input type="text" id="modalBuscar" placeholder="Buscar por nombre..." style="width:100%;margin-bottom:10px;">
        <div id="modalLista" style="max-height:300px;overflow-y:auto;"></div>
      </div>
    </div>
    <div id="modalFactura" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.3);z-index:4000;">
      <div style="background:#fff;max-width:600px;margin:60px auto;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.2);position:relative;">
        <button id="cerrarModalFactura" style="position:absolute;top:10px;right:10px;font-size:1.2em;">&times;</button>
        <div id="modalFacturaContent"></div>
      </div>
    </div>
    <div id="modalConfirmacion" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.3);z-index:5000;">
      <div style="background:#fff;max-width:350px;margin:120px auto;padding:24px 20px;border-radius:10px;box-shadow:0 2px 12px rgba(33,150,243,0.18);position:relative;text-align:center;">
        <h3 style="color:#1769aa;margin-bottom:18px;">¿Está seguro de finalizar la venta?</h3>
        <button id="btnConfirmarVenta" class="btn" style="margin-right:12px;">Aceptar</button>
        <button id="btnCancelarVenta" class="btn" style="background:#f44336;">Cancelar</button>
      </div>
    </div>
    <form id="ventaForm">
      <table id="tablaVenta">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Precio Unitario</th>
            <th>Subtotal</th>
            <th>Eliminar</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="totals">
        <div>Subtotal: <span id="subtotal">0.00</span></div>
        <div>ITBIS (18%): <span id="itbis">0.00</span></div>
        <div><b>Total: <span id="total">0.00</span></b></div>
      </div>
      <label>Cliente:</label>
      <input type="text" id="clienteNombre" placeholder="Nombre del cliente">
      <input type="text" id="clienteRNC" placeholder="RNC">
      <button type="button" id="btnVenta" class="btn">Realizar Venta e Imprimir Factura</button>
    </form>
    <div id="factura" style="display:none; margin-top:30px;"></div>
    <div id="mensajeVenta" style="display:none;position:fixed;top:90px;right:30px;background:#4caf50;color:#fff;padding:15px 30px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.2);font-size:1.2em;z-index:2000;">¡Venta realizada exitosamente!</div>
    <div id="mensajeError" style="display:none;position:fixed;top:90px;left:30px;background:#f44336;color:#fff;padding:15px 30px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.2);font-size:1.1em;z-index:2000;"></div>
  </section>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      fetch('header.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('header-container').innerHTML = html;
          // Ejecutar los scripts del header
          const scripts = document.getElementById('header-container').querySelectorAll('script');
          scripts.forEach(script => {
            const newScript = document.createElement('script');
            if (script.src) {
              newScript.src = script.src;
            } else {
              newScript.textContent = script.textContent;
            }
            document.body.appendChild(newScript);
          });
        });
    });
    let productosVenta = [];
    let productosBuscados = [];
    let todosProductos = [];
    let inventarioActual = {};
    document.getElementById('buscarProducto').addEventListener('input', function(e) {
      if (e.inputType === 'insertLineBreak') return; // Ignorar Enter
      buscarProductos(this.value);
    });
    document.getElementById('btnLupa').addEventListener('click', function() {
      abrirModalProductos();
    });
    document.getElementById('btnVenta').addEventListener('click', function() {
      document.getElementById('modalConfirmacion').style.display = 'block';
    });
    document.getElementById('btnConfirmarVenta').addEventListener('click', function() {
      document.getElementById('modalConfirmacion').style.display = 'none';
      realizarVenta();
    });
    document.getElementById('btnCancelarVenta').addEventListener('click', function() {
      document.getElementById('modalConfirmacion').style.display = 'none';
    });
    document.getElementById('ventaForm').addEventListener('submit', function(e) {
      e.preventDefault(); // Evitar submit por Enter
    });
    function buscarProductos(q) {
      fetch(`http://localhost:5000/api/sales/productos?q=${encodeURIComponent(q)}`)
        .then (r => r.json())
        .then(data => {
          productosBuscados = data;
          actualizarInventario(data);
          let html = '';
          data.forEach(p => {
            const rojo = p.cantidad < 1 ? "color:#f44336;" : "";
            const disabled = p.cantidad < 1 ? "pointer-events:none;opacity:0.6;" : "";
            html += `<div style='padding:5px; cursor:pointer;${rojo}${disabled}' onclick='agregarProducto(${p.id})'>${p.nombre} (${p.codigo_barras}) - ${p.precio} <span style='color:#888;'>[${p.cantidad} disponibles]</span></div>`;
          });
          document.getElementById('resultadosBusqueda').innerHTML = html;
        });
    }
    function actualizarInventario(lista) {
      lista.forEach(p => { inventarioActual[p.id] = p.cantidad; });
    }
    window.agregarProducto = function(id) {
      const prod = (productosBuscados.find(p => p.id === id) || todosProductos.find(p => p.id === id));
      if (!prod) return;
      if (productosVenta.find(p => p.id === id)) return;
      if (prod.cantidad < 1) {
        mostrarMensajeError(`No quedan existencias de ${prod.nombre}`);
        return;
      }
      productosVenta.push({ id: prod.id, nombre: prod.nombre, precio: prod.precio, cantidad: 1, max: prod.cantidad });
      renderTablaVenta();
      document.getElementById('resultadosBusqueda').innerHTML = '';
      document.getElementById('buscarProducto').value = '';
      cerrarModalProductos();
    }
    function renderTablaVenta() {
      const tbody = document.querySelector('#tablaVenta tbody');
      tbody.innerHTML = '';
      let subtotal = 0;
      productosVenta.forEach((p, idx) => {
        const sub = p.precio * p.cantidad;
        subtotal += sub;
        tbody.innerHTML += `<tr>
          <td>${p.nombre}</td>
          <td><input type='number' min='1' max='${p.max}' value='${p.cantidad}' onchange='cambiarCantidad(${idx}, this.value)'> <span style='color:#888;'>[${p.max} disponibles]</span></td>
          <td>${p.precio.toFixed(2)}</td>
          <td>${sub.toFixed(2)}</td>
          <td><button type='button' class='icon-btn' title='Eliminar' onclick='eliminarProducto(${idx})'><i class='fas fa-times-circle'></i></button></td>
        </tr>`;
      });
      const itbis = +(subtotal * 0.18).toFixed(2);
      const total = +(subtotal + itbis).toFixed(2);
      document.getElementById('subtotal').textContent = subtotal.toFixed(2);
      document.getElementById('itbis').textContent = itbis.toFixed(2);
      document.getElementById('total').textContent = total.toFixed(2);
    }
    window.cambiarCantidad = function(idx, val) {
      val = parseInt(val) || 1;
      if (val > productosVenta[idx].max) {
        mostrarMensajeError(`Solo quedan ${productosVenta[idx].max} unidades de ${productosVenta[idx].nombre}`);
        productosVenta[idx].cantidad = productosVenta[idx].max;
      } else if (val < 1) {
        productosVenta[idx].cantidad = 1;
      } else {
        productosVenta[idx].cantidad = val;
      }
      renderTablaVenta();
    }
    window.eliminarProducto = function(idx) {
      productosVenta.splice(idx, 1);
      renderTablaVenta();
    }
    function realizarVenta() {
      if (productosVenta.length === 0) {
        mostrarMensajeError('Agregue productos a la venta');
        return;
      }
      for (let p of productosVenta) {
        if (p.cantidad > p.max) {
          mostrarMensajeError(`Solo quedan ${p.max} unidades de ${p.nombre}`);
          return;
        }
      }
      const cliente = {
        nombre: document.getElementById('clienteNombre').value,
        rnc: document.getElementById('clienteRNC').value
      };
      fetch('http://localhost:5000/api/sales/crear', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productos: productosVenta, cliente })
      })
      .then(r => r.json())
      .then(data => {
        if (data.ventaId) {
          mostrarMensajeVenta();
          // Guardar notificación de venta
          fetch('http://localhost:5000/api/notifications/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mensaje: `Venta realizada: ${cliente.nombre || 'Sin nombre'} - Total: $${document.getElementById('total').textContent}` })
          });
          fetch(`http://localhost:5000/api/sales/factura/${data.ventaId}`)
            .then(r => r.json())
            .then(factura => mostrarFacturaModal(factura));
          limpiarVenta();
        } else {
          mostrarMensajeError(data.message || 'Error al realizar la venta');
        }
      });
    }
    function limpiarVenta() {
      productosVenta = [];
      renderTablaVenta();
      document.getElementById('clienteNombre').value = '';
      document.getElementById('clienteRNC').value = '';
    }
    function mostrarMensajeVenta() {
      const msg = document.getElementById('mensajeVenta');
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 2500);
    }
    function mostrarMensajeError(texto) {
      const msg = document.getElementById('mensajeError');
      msg.textContent = texto;
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 3000);
    }
    function mostrarFacturaModal(factura) {
      function formatFecha(fechaStr) {
        const d = new Date(fechaStr);
        const pad = n => n < 10 ? '0'+n : n;
        return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      }
      let html = `<div id='facturaContent' style='max-width:400px;margin:auto;'>
        <div style='text-align:center;margin-bottom:10px;'>
          <img src='images/LOGO.jpg' alt='Logo' style='max-width:120px;max-height:60px;margin-bottom:8px;'>
        </div>
        <div style='text-align:center;font-size:1.08em;margin-bottom:6px;font-weight:700;color:#1769aa;'>Mi Empresa S.A.</div>
        <div style='text-align:center;font-size:0.98em;margin-bottom:4px;'>Dirección: Calle Principal #123, Ciudad</div>
        <div style='text-align:center;font-size:0.98em;margin-bottom:4px;'>Teléfono: (809) 555-1234</div>
        <div style='text-align:center;font-size:0.98em;margin-bottom:8px;'>Vendedor: Vendedor</div>
        <h2 style='text-align:center;color:#1769aa;margin-bottom:8px;'>Factura</h2>
        <div style='font-size:1em;margin-bottom:6px;'>Cliente: <b>${factura.venta.cliente_nombre || ''}</b></div>
        <div style='font-size:1em;margin-bottom:6px;'>RNC: <b>${factura.venta.cliente_rnc || ''}</b></div>
        <div style='font-size:1em;margin-bottom:10px;'>Fecha: <b>${formatFecha(factura.venta.fecha)}</b></div>
        <table style='width:100%;font-size:0.98em;'>
          <thead><tr>
            <th>Producto</th>
            <th>Cant.</th>
            <th>Precio</th>
          </tr></thead>
          <tbody>`;
      factura.detalle.forEach(d => {
        html += `<tr>
          <td>${d.nombre}</td>
          <td style='text-align:center;'>${d.cantidad}</td>
          <td style='text-align:right;'>${d.precio_unitario.toFixed(2)}</td>
        </tr>`;
      });
      html += `</tbody></table>
        <div class='totals' style='margin-top:10px;font-size:1.05em;text-align:right;'>
          Subt.: <b>${factura.venta.subtotal.toFixed(2)}</b><br>
          ITBIS: <b>${factura.venta.itbis.toFixed(2)}</b><br>
          <span style='font-size:1.15em;'>Total: <b>${factura.venta.total.toFixed(2)}</b></span>
        </div>
        <button class='btn' style='margin-top:18px;width:100%;font-size:1.1em;' onclick='imprimirSoloFactura()'>Imprimir</button>
      </div>`;
      document.getElementById('modalFacturaContent').innerHTML = html;
      document.getElementById('modalFactura').style.display = 'block';
    }
    document.getElementById('cerrarModalFactura').addEventListener('click', function() {
      document.getElementById('modalFactura').style.display = 'none';
      location.reload();
    });
    function imprimirSoloFactura() {
      const facturaHtml = document.getElementById('facturaContent').innerHTML;
      const ventana = window.open('', '', 'width=350,height=600');
      ventana.document.write(`
        <html><head><title>Factura</title>
        <style>
          body { font-family: 'Courier New', Courier, monospace; font-size: 12px; margin: 0; padding: 10px; width: 58mm; }
          h2 { font-size: 16px; text-align: center; margin: 5px 0; }
          table { width: 100%; border-collapse: collapse; font-size: 12px; }
          th, td { border: none; padding: 2px 0; text-align: left; }
          th { font-weight: bold; border-bottom: 1px solid #000; }
          .totals { text-align: right; margin-top: 8px; font-size: 13px; }
          @media print {
            body { width: 58mm; }
            .btn { display: none; }
          }
        </style>
        </head><body>
          ${facturaHtml}
        </body></html>`);
      ventana.document.close();
      ventana.focus();
      ventana.print();
      ventana.close();
      document.getElementById('modalFactura').style.display = 'none';
      location.reload();
    }
    // Modal de productos
    function abrirModalProductos() {
      document.getElementById('modalProductos').style.display = 'block';
      if (todosProductos.length === 0) {
        fetch('http://localhost:5000/api/sales/productos?q=')
          .then(r => r.json())
          .then(data => {
            todosProductos = data;
            actualizarInventario(data);
            renderModalLista(data);
          });
      } else {
        renderModalLista(todosProductos);
      }
      document.getElementById('modalBuscar').value = '';
    }
    function cerrarModalProductos() {
      document.getElementById('modalProductos').style.display = 'none';
    }
    document.getElementById('cerrarModal').addEventListener('click', cerrarModalProductos);
    document.getElementById('modalBuscar').addEventListener('input', function() {
      const val = this.value.toLowerCase();
      const filtrados = todosProductos.filter(p => p.nombre.toLowerCase().includes(val));
      renderModalLista(filtrados);
    });
    function renderModalLista(lista) {
      let html = '';
      lista.forEach(p => {
        const rojo = p.cantidad < 1 ? "color:#f44336;" : "";
        const disabled = p.cantidad < 1 ? "pointer-events:none;opacity:0.6;" : "";
        html += `<div style='padding:7px; border-bottom:1px solid #eee; cursor:pointer;${rojo}${disabled}' onclick='agregarProducto(${p.id})'>${p.nombre} (${p.codigo_barras}) - ${p.precio} <span style='color:#888;'>[${p.cantidad} disponibles]</span></div>`;
      });
      document.getElementById('modalLista').innerHTML = html;
    }
  </script>
</body>
</html>
